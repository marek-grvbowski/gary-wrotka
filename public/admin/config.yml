backend:
  name: github
  repo: marek-grvbowski/gary-wrotka
  branch: main
  auth_endpoint: api/auth

# Aby edytować lokalnie bez logowania do GitHuba — odkomentuj poniższą linię
# i uruchom `npx @sveltia/proxy-server` w drugim terminalu.
# local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

logo_url: /images/brand/logo-mark.svg

locale: "pl"

collections:
  - name: "products"
    label: "Produkty"
    label_singular: "Produkt"
    folder: "src/content/products"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{slug}}"
    summary: "{{name}} — {{category}} ({{volume}})"
    sortable_fields: ["order", "name", "category"]
    fields:
      # ── Podstawowe ───────────────────────────────────────
      - { name: "name", label: "Nazwa produktu", widget: "string" }
      - {
          name: "category",
          label: "Kategoria",
          widget: "select",
          options: ["kombucha", "sos", "ocet"]
        }
      - {
          name: "categoryLabel",
          label: "Etykieta kategorii (pełna, na karcie produktu)",
          widget: "string",
          hint: "np. 'Kombucha · 330 ml', 'Sos fermentowany · 200 ml'",
          required: false
        }
      - {
          name: "edition",
          label: "Edycja / wariant (opcjonalnie)",
          widget: "string",
          hint: "np. 'Edycja eksperymentalna 001' — pokazuje się jako pill na hero",
          required: false
        }
      - {
          name: "tag",
          label: "Tag na karcie w katalogu (opcjonalnie)",
          widget: "string",
          hint: "np. 'Edycja 001', 'Bestseller', 'Nowość'",
          required: false
        }
      - { name: "flavor", label: "Smak (krótki opis, jedna linia)", widget: "string" }
      - { name: "volume", label: "Pojemność / waga", widget: "string", hint: "np. 330 ml, 500 g" }
      - { name: "shortDescription", label: "Krótki opis (do karty)", widget: "text" }

      # ── Status ────────────────────────────────────────────
      - { name: "available", label: "Dostępny", widget: "boolean", default: true }
      - { name: "featured", label: "Wyróżniony (pokazany na home)", widget: "boolean", default: false }
      - { name: "order", label: "Kolejność (mniejsza = wcześniej)", widget: "number", default: 100, value_type: "int" }

      # ── Zdjęcia ──────────────────────────────────────────
      - name: "images"
        label: "Zdjęcia produktu"
        widget: "list"
        hint: "Drag-and-drop dla zmiany kolejności. Pierwsze zdjęcie jest główne, kolejne to thumbnails w galerii."
        field: { name: "src", label: "Zdjęcie", widget: "image" }

      # ── Skład prosty (na karcie produktu) ────────────────
      - name: "ingredients"
        label: "Skład (prosta lista)"
        widget: "list"
        hint: "Krótka lista składników. Pojawia się jako bullet-lista pod opisem produktu."
        field: { name: "item", label: "Składnik", widget: "string" }
        required: false

      # ── Plakietki / badges ───────────────────────────────
      - name: "badges"
        label: "Plakietki (Vegan, BIO, Limited 240 szt itp.)"
        widget: "list"
        field: { name: "label", label: "Tekst plakietki", widget: "string" }
        required: false

      # ── Specyfikacja (tabela klucz/wartość) ──────────────
      - name: "specs"
        label: "Specyfikacja (tabela klucz → wartość)"
        widget: "list"
        hint: "Renderowane jako grid 2-kolumnowy w hero. np. Pojemność: 330 ml, Karton: 6/12/24 szt, Trwałość: 6 miesięcy 4–10°C"
        fields:
          - { name: "k", label: "Klucz", widget: "string" }
          - { name: "v", label: "Wartość", widget: "string" }
        required: false

      # ── Profil sensoryczny (animowane paski 0–10) ────────
      - name: "flavorProfile"
        label: "Profil smaku (paski 0–10)"
        widget: "list"
        hint: "6 wymiarów — animowane paski na karcie produktu. Każdy ma wartość 0–10."
        fields:
          - { name: "label", label: "Cecha (np. Kwasowość, Musowanie)", widget: "string" }
          - {
              name: "value",
              label: "Wartość 0–10",
              widget: "number",
              value_type: "int",
              min: 0,
              max: 10
            }
        required: false

      # ── Składniki ze szczegółowymi notami ─────────────────
      - name: "detailedIngredients"
        label: "Skład — z notami pochodzenia (siatka 4-kolumn)"
        widget: "list"
        hint: "Bogatsza wersja składu, renderuje jako siatkę kart z notami. Pojawia się jako sekcja 'Skład — N rzeczy, nic więcej'."
        fields:
          - { name: "name", label: "Nazwa składnika", widget: "string" }
          - { name: "note", label: "Nota / pochodzenie", widget: "string" }
        required: false

      # ── Proces produkcji (timeline 4 kroków) ─────────────
      - name: "process"
        label: "Proces produkcji (oś czasu)"
        widget: "list"
        hint: "4 kroki — timeline z markerami numerowanymi. Renderowane jako 'Jak powstaje'."
        fields:
          - { name: "label", label: "Tytuł kroku (np. Cold brew espresso)", widget: "string" }
          - { name: "duration", label: "Czas trwania (np. 14 dni · 22°C)", widget: "string" }
          - { name: "desc", label: "Opis", widget: "text" }
        required: false

      # ── Historia butelki (sekcja split z foto) ───────────
      - name: "story"
        label: "Historia produktu (sekcja split z fotem)"
        widget: "object"
        collapsed: true
        required: false
        fields:
          - { name: "eyebrow", label: "Eyebrow (mały tekst nad tytułem)", widget: "string", default: "Historia tej butelki" }
          - { name: "title", label: "Tytuł sekcji", widget: "string" }
          - name: "paragraphs"
            label: "Akapity opisu"
            widget: "list"
            field: { name: "text", label: "Akapit", widget: "text" }
          - { name: "image", label: "Zdjęcie do sekcji story", widget: "image" }
          - { name: "caption", label: "Podpis pod zdjęciem (opcjonalnie)", widget: "string", required: false }

      # ── Pełny opis (markdown body) ───────────────────────
      - {
          name: "body",
          label: "Pełny opis (markdown — wyświetlany pod sekcjami)",
          widget: "markdown",
          required: false
        }

  - name: "blog"
    label: "Blog / Dziennik"
    label_singular: "Wpis"
    folder: "src/content/blog"
    create: true
    extension: "mdx"
    format: "frontmatter"
    slug: "{{slug}}"
    summary: "{{title}} — {{pubDate}}"
    sortable_fields: ["pubDate", "title"]
    fields:
      - { name: "title", label: "Tytuł", widget: "string" }
      - { name: "description", label: "Krótki opis (do karty i SEO)", widget: "text" }
      - { name: "pubDate", label: "Data publikacji", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { name: "author", label: "Autor", widget: "string", default: "Studio Wro" }
      - { name: "cover", label: "Zdjęcie tytułowe", widget: "image", required: false }
      - name: "tags"
        label: "Tagi"
        widget: "list"
        field: { name: "tag", label: "Tag", widget: "string" }
      - { name: "draft", label: "Szkic (niewidoczny publicznie)", widget: "boolean", default: false }
      - { name: "body", label: "Treść", widget: "markdown" }

  - name: "site"
    label: "🛠 Ustawienia strony"
    files:
      # ════════════════════════════════════════════════════════════════
      # STRONA GŁÓWNA — pełny edytor home.md
      # ════════════════════════════════════════════════════════════════
      - name: "home"
        label: "🏠 Strona główna"
        file: "src/content/site/home.md"
        format: "frontmatter"
        description: "Tu edytujesz wszystkie teksty, obrazki i sekcje strony głównej. Hero, manifest, proces, blog, B2B."
        fields:
          # ─── HERO ─────────────────────────────────────────────
          - name: "homeHero"
            label: "🎬 Hero (wielki ekran na górze)"
            widget: "object"
            collapsed: false
            hint: "Tytuł, podtytuł i przyciski w głównym banerze strony."
            fields:
              - { name: "eyebrow", label: "Eyebrow (mały tekst nad tytułem)", widget: "string" }
              - { name: "title", label: "Tytuł hero (duży, główny)", widget: "string" }
              - { name: "subtitle", label: "Podtytuł", widget: "text" }
              - name: "primaryCta"
                label: "Przycisk główny"
                widget: "object"
                fields:
                  - { name: "label", label: "Tekst przycisku", widget: "string", default: "Zobacz katalog" }
                  - { name: "href", label: "Link / kotwica", widget: "string", default: "/katalog" }
              - name: "secondaryCta"
                label: "Przycisk drugi (ghost)"
                widget: "object"
                fields:
                  - { name: "label", label: "Tekst przycisku", widget: "string", default: "Manifest" }
                  - { name: "href", label: "Link / kotwica", widget: "string", default: "#manifest" }

          - name: "heroImages"
            label: "🖼 Zdjęcia hero (carousel — drag-and-drop kolejności)"
            widget: "list"
            hint: "Crossfade co 6.5s. Pierwsze zdjęcie pokazuje się jako pierwsze."
            field: { name: "src", label: "Zdjęcie", widget: "image" }

          # ─── WIDOCZNOŚĆ SEKCJI ────────────────────────────────
          - name: "homeSections"
            label: "👁 Które sekcje pokazać na stronie głównej?"
            widget: "object"
            collapsed: false
            hint: "Wyłącz dowolną sekcję — zniknie ze strony. Hero zawsze widoczne."
            fields:
              - { name: "manifest", label: "Sekcja: Manifest", widget: "boolean", default: true }
              - { name: "featured", label: "Sekcja: Katalog (wybrane fermenty)", widget: "boolean", default: true }
              - { name: "process", label: "Sekcja: Proces (4 kroki)", widget: "boolean", default: true }
              - { name: "blog", label: "Sekcja: Dziennik (ostatnie wpisy)", widget: "boolean", default: true }
              - { name: "b2b", label: "Sekcja: B2B (CTA)", widget: "boolean", default: true }

          # ─── MANIFEST ────────────────────────────────────────
          - name: "manifest"
            label: "✍️ Sekcja Manifest"
            widget: "object"
            collapsed: true
            fields:
              - { name: "eyebrow", label: "Eyebrow", widget: "string", default: "Manifest" }
              - { name: "title", label: "Tytuł sekcji", widget: "string" }
              - {
                  name: "body",
                  label: "Treść (akapity oddziel pustą linią)",
                  widget: "text",
                  hint: "Dwie pustą linia = nowy akapit."
                }
              - { name: "image", label: "Zdjęcie obok tekstu", widget: "image" }
              - { name: "caption", label: "Podpis pod zdjęciem", widget: "string" }
              - { name: "ctaLabel", label: "Etykieta przycisku", widget: "string", default: "Czytaj cały manifest" }
              - { name: "ctaHref", label: "Link przycisku", widget: "string", default: "/o-nas" }

          # ─── FEATURED ────────────────────────────────────────
          - name: "featured"
            label: "🍶 Sekcja Katalog (nagłówek)"
            widget: "object"
            collapsed: true
            hint: "Same produkty wyświetlają się z tych, które oznaczysz jako 'Wyróżniony' w kolekcji Produkty."
            fields:
              - { name: "eyebrow", label: "Eyebrow", widget: "string", default: "Katalog" }
              - { name: "title", label: "Tytuł sekcji", widget: "string", default: "Wybrane fermenty." }

          # ─── PROCESS ─────────────────────────────────────────
          - name: "processSection"
            label: "⚙️ Sekcja Proces (4 kroki)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "eyebrow", label: "Eyebrow", widget: "string", default: "Jak powstają" }
              - { name: "title", label: "Tytuł sekcji", widget: "string" }
              - name: "steps"
                label: "Kroki (4)"
                widget: "list"
                hint: "Drag-and-drop dla zmiany kolejności."
                fields:
                  - { name: "n", label: "Numer (np. 01)", widget: "string" }
                  - { name: "label", label: "Tytuł kroku", widget: "string" }
                  - { name: "desc", label: "Opis", widget: "text" }

          # ─── BLOG ────────────────────────────────────────────
          - name: "blogSection"
            label: "📝 Sekcja Dziennik (nagłówek)"
            widget: "object"
            collapsed: true
            hint: "Same wpisy wyświetlają się automatycznie — 2 najnowsze z kolekcji Blog."
            fields:
              - { name: "eyebrow", label: "Eyebrow", widget: "string", default: "Dziennik" }
              - { name: "title", label: "Tytuł sekcji", widget: "string", default: "Co właśnie czytamy." }

          # ─── B2B CTA ─────────────────────────────────────────
          - name: "b2b"
            label: "💼 Sekcja B2B (ciemna na dole)"
            widget: "object"
            collapsed: true
            fields:
              - { name: "eyebrow", label: "Eyebrow", widget: "string" }
              - { name: "title", label: "Tytuł", widget: "string" }
              - { name: "accent", label: "Tytuł — drugi wiersz (kursywą)", widget: "string" }
              - { name: "body", label: "Opis pod tytułem", widget: "text" }
              - { name: "mail", label: "Mail B2B widoczny obok przycisku", widget: "string" }
              - { name: "buttonLabel", label: "Etykieta przycisku", widget: "string", default: "Formularz B2B" }
              - { name: "buttonHref", label: "Link przycisku", widget: "string", default: "/b2b" }

      # ════════════════════════════════════════════════════════════════
      # USTAWIENIA GLOBALNE — marka, kontakt, kolor akcentu
      # ════════════════════════════════════════════════════════════════
      - name: "global"
        label: "⚙️ Ustawienia globalne (marka, kolor, kontakt)"
        file: "src/content/site/global.md"
        format: "frontmatter"
        description: "Dane firmy widoczne wszędzie (stopka, kontakt), kolor akcentu marki, social media."
        fields:
          - { name: "brandName", label: "Nazwa marki", widget: "string" }
          - { name: "tagline", label: "Tagline (slogan widoczny w SEO i stopce)", widget: "string" }
          - {
              name: "accentColor",
              label: "🎨 Kolor akcentu marki",
              widget: "color",
              hint: "Używany na całej stronie: linki, plakietki, podkreślenia.",
              enableAlpha: false,
              default: "#c33366"
            }
          - {
              name: "accentDeepColor",
              label: "🎨 Akcent ciemniejszy (hover)",
              widget: "color",
              hint: "Ciemniejszy wariant — pojawia się przy najechaniu.",
              enableAlpha: false,
              default: "#663366"
            }
          - { name: "contactEmail", label: "E-mail kontaktowy", widget: "string" }
          - { name: "orderEmail", label: "E-mail zamówień", widget: "string" }
          - { name: "phone", label: "Telefon", widget: "string", required: false }
          - { name: "address", label: "Adres", widget: "string", required: false }
          - name: "socials"
            label: "Social media"
            widget: "object"
            fields:
              - { name: "instagram", label: "Instagram URL", widget: "string", required: false }
              - { name: "facebook", label: "Facebook URL", widget: "string", required: false }

          # ─── STOPKA ───────────────────────────────────────────
          - name: "footer"
            label: "🦶 Stopka strony"
            widget: "object"
            collapsed: false
            hint: "Zawartość stopki na dole każdej strony — nagłówki kolumn, copyright, NIP."
            fields:
              - {
                  name: "description",
                  label: "Opis pod nazwą marki",
                  widget: "text",
                  hint: "Krótki tekst w pierwszej kolumnie stopki."
                }
              - {
                  name: "copyright",
                  label: "Linia copyright",
                  widget: "string",
                  hint: "np. '© 2026 Gary Wrotka · Studio Nowy Sącz'"
                }
              - {
                  name: "taxId",
                  label: "NIP / VAT (opcjonalnie)",
                  widget: "string",
                  required: false
                }
              - { name: "shopHeading", label: "Nagłówek kolumny: Sklep", widget: "string", default: "Sklep" }
              - { name: "aboutHeading", label: "Nagłówek kolumny: O nas", widget: "string", default: "O nas" }
              - { name: "contactHeading", label: "Nagłówek kolumny: Kontakt", widget: "string", default: "Kontakt" }
